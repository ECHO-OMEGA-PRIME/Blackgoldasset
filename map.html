<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formation Map — BGAT Water Intel</title>
  <meta name="description" content="Interactive geospatial water chemistry map of the Permian Basin with formation heat maps.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://www.blackgoldasset.com/map.html">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#C8952E">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/water-intel.css">
  <style>
    .map-info-window { font-family: var(--font-body); color: #1a1a1a; }
    .map-info-window h4 { font-family: var(--font-heading); font-weight: 700; margin-bottom: 4px; }
    .map-info-window p { font-size: 0.85rem; margin: 2px 0; }
    .map-info-window .map-link { color: #C8952E; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/common.js"></script>
  <script>
  (function() {
    'use strict';
    var api = bgat.api.apiFetch;
    var c = bgat.common;

    var content = c.initPage({
      page: 'map',
      title: 'Formation Map',
      subtitle: 'Interactive geospatial water chemistry visualization'
    });

    var map = null;
    var markers = [];
    var heatmapLayer = null;
    var infoWindow = null;
    var selectedIon = 'tds';

    // Build controls + map container
    var html = '';
    html += '<div class="map-controls">';
    html += '<label style="font-family:var(--font-heading);font-size:0.75rem;color:var(--white-dim);text-transform:uppercase;letter-spacing:1px">Heatmap Ion:</label>';
    html += '<select id="mapIonSelect" style="padding:6px 12px;background:var(--black-card);border:1px solid rgba(200,149,46,0.2);border-radius:4px;color:var(--white);font-family:var(--font-body)">';
    ['tds','chloride','calcium','barium','iron','manganese','h2s','sulfate','sodium'].forEach(function(ion) {
      html += '<option value="' + ion + '"' + (ion === 'tds' ? ' selected' : '') + '>' + ion.replace(/_/g, ' ').toUpperCase() + '</option>';
    });
    html += '</select>';
    html += '<button class="btn-outline btn-sm" id="toggleHeatmap">Toggle Heatmap</button>';
    html += '<button class="btn-outline btn-sm" id="toggleMarkers">Toggle Markers</button>';
    html += '</div>';
    html += '<div id="mapDiv" class="map-container" style="background:var(--black-card);display:flex;align-items:center;justify-content:center">';
    html += '<p style="color:var(--white-dim)">Loading map...</p>';
    html += '</div>';

    content.innerHTML = html;

    // Load Google Maps API
    var gmScript = document.createElement('script');
    gmScript.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyCuTHwqo6HPjR0oSlCnWBkRslXTZg41VWY&libraries=visualization&callback=wiInitMap';
    gmScript.async = true;
    gmScript.defer = true;
    document.head.appendChild(gmScript);

    window.wiInitMap = function() {
      var mapDiv = document.getElementById('mapDiv');
      mapDiv.innerHTML = '';

      map = new google.maps.Map(mapDiv, {
        center: { lat: 31.95, lng: -102.1 },
        zoom: 8,
        mapTypeId: 'terrain',
        styles: [
          { elementType: 'geometry', stylers: [{ color: '#1a1a1a' }] },
          { elementType: 'labels.text.fill', stylers: [{ color: '#C4B99A' }] },
          { elementType: 'labels.text.stroke', stylers: [{ color: '#0A0A0A' }] },
          { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#2a2a2a' }] },
          { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0d1117' }] },
          { featureType: 'poi', stylers: [{ visibility: 'off' }] }
        ]
      });

      infoWindow = new google.maps.InfoWindow();

      wiAuth.subscribe(function(s) {
        if (s.user && !s.loading) loadMapData();
      });

      document.getElementById('mapIonSelect').addEventListener('change', function() {
        selectedIon = this.value;
        loadHeatmap();
      });

      document.getElementById('toggleHeatmap').addEventListener('click', function() {
        if (heatmapLayer) {
          heatmapLayer.setMap(heatmapLayer.getMap() ? null : map);
        }
      });

      var markersVisible = true;
      document.getElementById('toggleMarkers').addEventListener('click', function() {
        markersVisible = !markersVisible;
        markers.forEach(function(m) { m.setVisible(markersVisible); });
      });
    };

    async function loadMapData() {
      try {
        var wells = await api('/api/v1/map/wells');
        var items = wells.items || wells || [];

        items.forEach(function(w) {
          if (!w.latitude || !w.longitude) return;

          var marker = new google.maps.Marker({
            position: { lat: w.latitude, lng: w.longitude },
            map: map,
            title: w.well_name,
            icon: {
              path: google.maps.SymbolPath.CIRCLE,
              scale: 6,
              fillColor: w.alert_count > 0 ? '#ef4444' : '#C8952E',
              fillOpacity: 0.9,
              strokeColor: '#0A0A0A',
              strokeWeight: 2
            }
          });

          marker.addListener('click', function() {
            var content = '<div class="map-info-window">' +
              '<h4>' + c.escapeHtml(w.well_name) + '</h4>' +
              '<p><strong>Operator:</strong> ' + c.escapeHtml(w.operator_name) + '</p>' +
              (w.formation ? '<p><strong>Formation:</strong> ' + c.escapeHtml(w.formation) + '</p>' : '') +
              (w.latest_tds ? '<p><strong>TDS:</strong> ' + c.formatNumber(w.latest_tds) + ' mg/L</p>' : '') +
              '<p><a class="map-link" href="well-detail.html?id=' + encodeURIComponent(w.id) + '">View Details →</a></p>' +
              '</div>';
            infoWindow.setContent(content);
            infoWindow.open(map, marker);
          });

          markers.push(marker);
        });

        loadHeatmap();
      } catch(e) {
        c.showToast('Error loading map data: ' + e.message, 'error');
      }
    }

    async function loadHeatmap() {
      try {
        var data = await api('/api/v1/map/heatmap/' + selectedIon);
        var points = (data.points || data || []).map(function(p) {
          return {
            location: new google.maps.LatLng(p.lat, p.lon),
            weight: p.value || 1
          };
        });

        if (heatmapLayer) heatmapLayer.setMap(null);
        heatmapLayer = new google.maps.visualization.HeatmapLayer({
          data: points,
          map: map,
          radius: 30,
          opacity: 0.6,
          gradient: [
            'rgba(0, 0, 0, 0)',
            'rgba(200, 149, 46, 0.3)',
            'rgba(232, 184, 75, 0.5)',
            'rgba(212, 113, 42, 0.7)',
            'rgba(239, 68, 68, 0.9)'
          ]
        });
      } catch(e) {
        // Heatmap data not available yet
      }
    }
  })();
  </script>
</body>
</html>
