<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses — BGAT Water Intel</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#C8952E">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/water-intel.css?v=20260310">
</head>
<body>
  <script src="assets/js/api.js?v=20260310"></script>
  <script src="assets/js/auth.js?v=20260310"></script>
  <script src="assets/js/common.js?v=20260310"></script>
  <script>
  (function() {
    'use strict';
    var api = bgat.api.apiFetch;
    var apiPost = bgat.api.apiPost || function(path, body) {
      return bgat.api.apiFetch(path, { method: 'POST', body: JSON.stringify(body) });
    };
    var c = bgat.common;

    var content = c.initPage({
      page: 'expenses',
      title: 'Expenses',
      subtitle: 'Track and manage all business expenses'
    });

    content.innerHTML = '<div class="stat-grid">' + c.skeletonRows(4, 120) + '</div>' +
      '<div class="glass-card" style="padding:24px">' + c.skeletonRows(5, 40) + '</div>';

    var wells = [];

    wiAuth.subscribe(function(s) {
      if (s.user && s.authorized && !s.loading) loadExpenses();
    });

    async function loadExpenses() {
      try {
        var [expensesRes, statsRes, wellsRes] = await Promise.all([
          api('/api/v1/expenses?per_page=50').catch(function() { return { items: [], total: 0 }; }),
          api('/api/v1/expenses/stats/summary').catch(function() { return {}; }),
          api('/api/v1/wells?per_page=200').catch(function() { return { items: [] }; })
        ]);
        wells = wellsRes.items || [];
        renderExpenses(expensesRes.items || [], statsRes);
      } catch(e) {
        content.innerHTML = '<div class="empty-state"><p>Error loading expenses: ' + c.escapeHtml(e.message) + '</p></div>';
      }
    }

    function renderExpenses(expenses, stats) {
      var html = '';

      html += '<div class="stat-grid">';
      html += statCard('Total Spent', '$' + formatMoney(stats.total_spent || 0), ICONS.dollar, '#ef4444');
      html += statCard('Pending', '$' + formatMoney(stats.pending || 0), ICONS.clock, 'var(--orange)');
      html += statCard('Approved', '$' + formatMoney(stats.approved || 0), ICONS.check, '#3b82f6');
      html += statCard('Paid', stats.paid_count || 0, ICONS.paid, '#22c55e');
      html += '</div>';

      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">';
      html += '<span class="section-label">All Expenses</span>';
      html += '<div style="display:flex;gap:8px">';
      html += '<select id="filterCategory" class="wi-input" style="width:auto;padding:6px 12px;font-size:0.8rem">';
      html += '<option value="">All Categories</option>';
      var cats = ['operating','equipment','supplies','chemicals','lab_fees','fuel','insurance','rent','payroll','travel','maintenance','other'];
      cats.forEach(function(cat) {
        html += '<option value="' + cat + '">' + cat.replace(/_/g, ' ').replace(/\b\w/g, function(l){return l.toUpperCase()}) + '</option>';
      });
      html += '</select>';
      html += '<button class="btn-primary btn-sm" id="btnNewExpense">+ New Expense</button>';
      html += '</div></div>';

      html += '<div class="glass-card" style="padding:24px">';
      if (expenses.length === 0) {
        html += '<div class="empty-state">';
        html += '<svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>';
        html += '<p>No expenses recorded yet</p>';
        html += '<p style="font-size:0.8rem;color:var(--white-dim)">Click "New Expense" to track your first expense</p>';
        html += '</div>';
      } else {
        html += '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
        html += '<th>Date</th><th>Vendor</th><th>Category</th><th>Description</th><th>Amount</th><th>Status</th><th>Well</th><th>QB</th><th></th>';
        html += '</tr></thead><tbody>';
        expenses.forEach(function(exp) {
          html += '<tr>';
          html += '<td style="color:var(--white-dim)">' + c.formatDate(exp.expense_date || exp.created_at) + '</td>';
          html += '<td style="color:var(--gold);font-weight:600">' + c.escapeHtml(exp.vendor_name) + '</td>';
          html += '<td>' + categoryBadge(exp.category) + '</td>';
          html += '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + c.escapeHtml(exp.description || '—') + '</td>';
          html += '<td style="font-weight:600">$' + formatMoney(exp.total_cents / 100) + '</td>';
          html += '<td>' + statusBadge(exp.status) + '</td>';
          html += '<td style="color:var(--white-dim)">' + c.escapeHtml(exp.well_name || '—') + '</td>';
          html += '<td>' + qbBadge(exp.qb_sync_status) + '</td>';
          html += '<td style="white-space:nowrap">';
          if (exp.status === 'pending') {
            html += '<button class="btn-outline btn-sm" onclick="approveExpense(\'' + exp.id + '\')" style="font-size:0.7rem;padding:2px 8px">Approve</button> ';
          }
          if (exp.status === 'approved') {
            html += '<button class="btn-outline btn-sm" onclick="markExpensePaid(\'' + exp.id + '\')" style="font-size:0.7rem;padding:2px 8px">Mark Paid</button> ';
          }
          if (exp.status !== 'paid') {
            html += '<button class="btn-outline btn-sm" onclick="deleteExpense(\'' + exp.id + '\')" style="font-size:0.7rem;padding:2px 6px;color:#ef4444;border-color:#ef444440">&times;</button>';
          }
          html += '</td>';
          html += '</tr>';
        });
        html += '</tbody></table></div>';
      }
      html += '</div>';

      content.innerHTML = html;

      document.getElementById('btnNewExpense').addEventListener('click', showNewExpenseModal);
      document.getElementById('filterCategory').addEventListener('change', function() {
        var cat = this.value;
        loadFilteredExpenses(cat);
      });
    }

    async function loadFilteredExpenses(category) {
      try {
        var url = '/api/v1/expenses?per_page=50';
        if (category) url += '&category=' + encodeURIComponent(category);
        var [expensesRes, statsRes] = await Promise.all([
          api(url), api('/api/v1/expenses/stats/summary')
        ]);
        renderExpenses(expensesRes.items || [], statsRes);
        if (category) document.getElementById('filterCategory').value = category;
      } catch(e) {
        c.showToast('Error filtering: ' + e.message, 'error');
      }
    }

    function showNewExpenseModal() {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px';

      var wellOptions = '<option value="">— No specific well —</option>';
      wells.forEach(function(w) {
        wellOptions += '<option value="' + w.id + '">' + c.escapeHtml(w.well_name) + '</option>';
      });

      var cats = ['operating','equipment','supplies','chemicals','lab_fees','fuel','insurance','rent','payroll','travel','maintenance','other'];
      var catOpts = '';
      cats.forEach(function(cat) {
        catOpts += '<option value="' + cat + '">' + cat.replace(/_/g, ' ').replace(/\b\w/g, function(l){return l.toUpperCase()}) + '</option>';
      });

      var formHtml = '<div class="glass-card" style="padding:32px;max-width:550px;width:100%;max-height:90vh;overflow-y:auto">';
      formHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">';
      formHtml += '<h2 style="font-family:var(--font-heading);color:var(--gold);margin:0">New Expense</h2>';
      formHtml += '<button id="closeModal" style="background:none;border:none;color:var(--white-dim);font-size:1.5rem;cursor:pointer">&times;</button>';
      formHtml += '</div>';

      formHtml += '<div style="display:grid;gap:16px">';
      formHtml += formField('Vendor Name', '<input type="text" id="expVendor" placeholder="e.g. Halliburton" class="wi-input">');
      formHtml += formField('Vendor Email', '<input type="email" id="expEmail" placeholder="billing@vendor.com" class="wi-input">');
      formHtml += formField('Category', '<select id="expCategory" class="wi-input">' + catOpts + '</select>');
      formHtml += formField('Description', '<input type="text" id="expDesc" placeholder="What was purchased?" class="wi-input">');
      formHtml += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
      formHtml += formField('Amount ($)', '<input type="number" id="expAmount" value="" min="0" step="0.01" class="wi-input" placeholder="0.00">');
      formHtml += formField('Tax Rate', '<select id="expTaxRate" class="wi-input"><option value="0">No Tax</option><option value="0.0825">8.25% TX Sales Tax</option></select>');
      formHtml += '</div>';
      formHtml += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
      formHtml += formField('Expense Date', '<input type="date" id="expDate" class="wi-input">');
      formHtml += formField('Due Date', '<input type="date" id="expDue" class="wi-input">');
      formHtml += '</div>';
      formHtml += formField('Well (optional)', '<select id="expWell" class="wi-input">' + wellOptions + '</select>');
      formHtml += formField('Notes', '<textarea id="expNotes" rows="2" class="wi-input" placeholder="Optional notes..."></textarea>');
      formHtml += '</div>';

      formHtml += '<div style="margin-top:16px;padding:16px;border-radius:8px;background:rgba(200,149,46,0.1);border:1px solid rgba(200,149,46,0.2)">';
      formHtml += '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--white-dim)">Subtotal:</span><span id="expSubtotal" style="color:var(--white)">$0.00</span></div>';
      formHtml += '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--white-dim)">Tax:</span><span id="expTax" style="color:var(--white)">$0.00</span></div>';
      formHtml += '<div style="display:flex;justify-content:space-between;font-weight:700"><span style="color:var(--gold)">Total:</span><span id="expTotal" style="color:var(--gold)">$0.00</span></div>';
      formHtml += '</div>';

      formHtml += '<div style="display:flex;gap:12px;margin-top:24px">';
      formHtml += '<button id="btnCreateExpense" class="btn-primary" style="flex:1">Create Expense</button>';
      formHtml += '<button id="btnCancelExpense" class="btn-outline" style="flex:0">Cancel</button>';
      formHtml += '</div>';
      formHtml += '</div>';

      overlay.innerHTML = formHtml;
      document.body.appendChild(overlay);

      document.getElementById('expDate').value = new Date().toISOString().split('T')[0];

      function updateTotals() {
        var amount = parseFloat(document.getElementById('expAmount').value) || 0;
        var taxRate = parseFloat(document.getElementById('expTaxRate').value) || 0;
        var tax = amount * taxRate;
        document.getElementById('expSubtotal').textContent = '$' + formatMoney(amount);
        document.getElementById('expTax').textContent = '$' + formatMoney(tax);
        document.getElementById('expTotal').textContent = '$' + formatMoney(amount + tax);
      }
      document.getElementById('expAmount').addEventListener('input', updateTotals);
      document.getElementById('expTaxRate').addEventListener('change', updateTotals);

      function closeModal() { document.body.removeChild(overlay); }
      document.getElementById('closeModal').addEventListener('click', closeModal);
      document.getElementById('btnCancelExpense').addEventListener('click', closeModal);
      overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });

      document.getElementById('btnCreateExpense').addEventListener('click', async function() {
        var vendor = document.getElementById('expVendor').value.trim();
        if (!vendor) { c.showToast('Vendor name is required', 'error'); return; }
        var amount = parseFloat(document.getElementById('expAmount').value);
        if (!amount || amount <= 0) { c.showToast('Valid amount is required', 'error'); return; }

        var btn = this;
        btn.disabled = true;
        btn.textContent = 'Creating...';

        try {
          await apiPost('/api/v1/expenses', {
            vendor_name: vendor,
            vendor_email: document.getElementById('expEmail').value.trim() || undefined,
            category: document.getElementById('expCategory').value,
            description: document.getElementById('expDesc').value.trim() || undefined,
            amount: amount,
            tax_rate: parseFloat(document.getElementById('expTaxRate').value) || 0,
            expense_date: document.getElementById('expDate').value || undefined,
            due_date: document.getElementById('expDue').value || undefined,
            well_id: document.getElementById('expWell').value || undefined,
            notes: document.getElementById('expNotes').value.trim() || undefined
          });
          c.showToast('Expense created', 'success');
          closeModal();
          loadExpenses();
        } catch(e) {
          c.showToast('Error: ' + e.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Create Expense';
        }
      });
    }

    window.approveExpense = async function(id) {
      try {
        await bgat.api.apiFetch('/api/v1/expenses/' + id, {
          method: 'PATCH', body: JSON.stringify({ status: 'approved' })
        });
        c.showToast('Expense approved', 'success');
        loadExpenses();
      } catch(e) { c.showToast('Error: ' + e.message, 'error'); }
    };

    window.markExpensePaid = async function(id) {
      try {
        await bgat.api.apiFetch('/api/v1/expenses/' + id, {
          method: 'PATCH', body: JSON.stringify({ status: 'paid', paid_date: new Date().toISOString() })
        });
        c.showToast('Expense marked paid', 'success');
        loadExpenses();
      } catch(e) { c.showToast('Error: ' + e.message, 'error'); }
    };

    window.deleteExpense = async function(id) {
      if (!confirm('Delete this expense?')) return;
      try {
        await bgat.api.apiFetch('/api/v1/expenses/' + id, { method: 'DELETE' });
        c.showToast('Expense deleted', 'success');
        loadExpenses();
      } catch(e) { c.showToast('Error: ' + e.message, 'error'); }
    };

    // Helpers
    var ICONS = {
      dollar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
      clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
      paid: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
    };

    function formatMoney(n) { return (n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

    function statCard(label, value, icon, color) {
      return '<div class="stat-card">' +
        '<div class="stat-card-icon" style="background:' + color + '15;border:1px solid ' + color + '30">' +
        icon.replace('stroke="currentColor"', '').replace('<svg', '<svg style="stroke:' + color + '"') +
        '</div><div class="stat-card-label">' + label + '</div><div class="stat-card-value">' + value + '</div></div>';
    }

    function statusBadge(status) {
      var colors = { pending: '#f59e0b', approved: '#3b82f6', paid: '#22c55e', void: '#6b7280' };
      var color = colors[status] || '#94a3b8';
      return '<span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.7rem;font-family:var(--font-heading);text-transform:uppercase;letter-spacing:1px;background:' + color + '20;color:' + color + ';border:1px solid ' + color + '40">' + (status || 'unknown') + '</span>';
    }

    function categoryBadge(cat) {
      return '<span style="display:inline-block;padding:2px 8px;border-radius:8px;font-size:0.7rem;background:rgba(200,149,46,0.15);color:var(--gold);border:1px solid rgba(200,149,46,0.25)">' + (cat || 'other').replace(/_/g, ' ') + '</span>';
    }

    function qbBadge(status) {
      if (status === 'synced') return '<span style="color:#22c55e;font-size:0.75rem">✓ Synced</span>';
      if (status === 'error') return '<span style="color:#ef4444;font-size:0.75rem">✗ Error</span>';
      return '<span style="color:#94a3b8;font-size:0.75rem">○ Pending</span>';
    }

    function formField(label, inputHtml) {
      return '<div><label style="display:block;font-family:var(--font-heading);font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--white-dim);margin-bottom:4px">' + label + '</label>' + inputHtml + '</div>';
    }
  })();
  </script>
</body>
</html>
